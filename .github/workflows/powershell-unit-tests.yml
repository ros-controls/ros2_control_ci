name: PowerShell Unit Tests

on:
  pull_request:
    paths:
      - 'scripts/**/*.ps1'
      - 'tests/**/*.ps1'
      - '.github/workflows/powershell-unit-tests.yml'
  push:
    branches:
      - master
    paths:
      - 'scripts/**/*.ps1'
      - 'tests/**/*.ps1'
      - '.github/workflows/powershell-unit-tests.yml'
  workflow_dispatch:

jobs:
  pester:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0

      - name: Run PowerShell unit tests
        shell: pwsh
        run: |
          Invoke-Pester ./tests/Update-PixiManifest.Tests.ps1 -Output Detailed -CI
